<!DOCTYPE html>

<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-dim": "#d277ff",
                        "surface-container-low": "#131313",
                        "on-tertiary-fixed": "#1e0053",
                        "on-tertiary": "#270068",
                        "surface-container-highest": "#262626",
                        "tertiary-dim": "#844eff",
                        "primary-fixed-dim": "#cb66fe",
                        "on-tertiary-fixed-variant": "#4500a9",
                        "on-secondary": "#525151",
                        "surface-container": "#1a1919",
                        "secondary-fixed": "#e5e2e1",
                        "on-surface-variant": "#adaaaa",
                        "surface": "#0e0e0e",
                        "on-tertiary-container": "#ffffff",
                        "secondary-dim": "#d6d4d3",
                        "primary": "#db90ff",
                        "tertiary-container": "#7631fd",
                        "secondary-fixed-dim": "#d6d4d3",
                        "error": "#ff6e84",
                        "on-primary": "#4e0070",
                        "on-secondary-container": "#d2d0cf",
                        "inverse-primary": "#9027c4",
                        "on-secondary-fixed-variant": "#5c5b5b",
                        "surface-container-lowest": "#000000",
                        "background": "#0e0e0e",
                        "surface-container-high": "#201f1f",
                        "on-primary-fixed-variant": "#4a006b",
                        "tertiary-fixed-dim": "#af91ff",
                        "on-surface": "#ffffff",
                        "on-secondary-fixed": "#403f3f",
                        "error-dim": "#d73357",
                        "surface-bright": "#2c2c2c",
                        "primary-fixed": "#d37bff",
                        "secondary-container": "#474746",
                        "surface-dim": "#0e0e0e",
                        "on-primary-container": "#3c0057",
                        "tertiary": "#aa8aff",
                        "tertiary-fixed": "#bba2ff",
                        "on-error-container": "#ffb2b9",
                        "surface-variant": "#262626",
                        "on-error": "#490013",
                        "inverse-surface": "#fcf8f8",
                        "outline-variant": "#494847",
                        "surface-tint": "#db90ff",
                        "on-primary-fixed": "#000000",
                        "on-background": "#ffffff",
                        "error-container": "#a70138",
                        "outline": "#777575",
                        "inverse-on-surface": "#565554",
                        "secondary": "#e5e2e1",
                        "primary-container": "#d37bff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .neon-glow {
            box-shadow: 0 0 40px 10px rgba(219, 144, 255, 0.15);
        }

        .glass-panel {
            background: rgba(38, 38, 38, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-surface text-on-surface font-body min-h-screen overflow-x-hidden flex flex-col">
    <!-- Ambient Background Glows -->
    <div
        class="fixed top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-primary/10 blur-[120px] pointer-events-none z-0">
    </div>
    <div
        class="fixed bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-tertiary/10 blur-[120px] pointer-events-none z-0">
    </div>
    <header
        class="fixed top-0 z-50 w-full bg-zinc-950/80 backdrop-blur-2xl shadow-[0_8px_32px_rgba(157,0,255,0.1)] flex justify-between items-center px-6 py-4">
        <div class="text-2xl font-black tracking-tighter text-white uppercase font-headline">ROLES</div>
        <div class="flex items-center gap-4">
            <button class="text-purple-400 p-2 active:scale-95 transition-transform">
                <span class="material-symbols-outlined">help_outline</span>
            </button>
        </div>
    </header>
    <main class="flex-grow flex items-center justify-center p-6 pt-24 pb-24 relative z-10">
        <div class="w-full max-w-md">
            <!-- Login Card -->
            <div
                class="glass-panel neon-glow rounded-3xl p-8 md:p-10 border border-outline-variant/15 flex flex-col gap-8">
                <div class="space-y-2">
                    <h1 class="text-4xl font-extrabold font-headline tracking-tight text-on-surface">
                        Bem-vindo <span class="text-primary">de volta.</span>
                    </h1>
                    <p class="text-on-surface-variant text-sm">Acesse sua conta para continuar.</p>
                </div>
                <div class="space-y-6">
                    <!-- Email Field -->
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-on-surface-variant block ml-1" for="email">E-mail</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">mail</span>
                            <input
                                class="w-full bg-surface-container-high border-none rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 transition-all"
                                id="email" placeholder="nome@exemplo.com" type="email" />
                        </div>
                    </div>
                    <!-- Password Field -->
                    <div class="space-y-2">
                        <div class="flex justify-between items-center px-1">
                            <label class="text-sm font-medium text-on-surface-variant" for="password">Senha</label>
                            <a class="text-xs text-primary-dim hover:text-primary transition-colors"
                                href="./forgot-password.html">Esqueceu?</a>
                        </div>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">lock</span>
                            <input
                                class="w-full bg-surface-container-high border-none rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 transition-all"
                                id="password" placeholder="••••••••" type="password" />
                        </div>
                    </div>
                    <!-- Message Paragraph (kept ID) -->
                    <p class="text-error text-xs font-medium min-h-[1rem] transition-all opacity-0" id="mensagem"></p>
                    <!-- Buttons Cluster -->
                    <div class="space-y-4 pt-2">
                        <button
                            class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary-container font-bold py-4 rounded-full active:scale-[0.98] transition-all shadow-lg shadow-primary/20 hover:shadow-primary/40"
                            id="btnLogin">
                            Entrar
                        </button>
                        <p id="message"></p>
                        <div class="relative py-2">
                            <div class="absolute inset-0 flex items-center">
                                <div class="w-full border-t border-outline-variant/20"></div>
                            </div>
                            <div class="relative flex justify-center text-xs uppercase"><span
                                    class="bg-surface-container-high/0 px-2 text-outline">ou</span></div>
                        </div>
                        <a href="./register.html">
                            <button
                                class="w-full bg-surface-variant/20 text-on-surface font-semibold py-4 rounded-full hover:bg-surface-variant/40 active:scale-[0.98] transition-all border border-outline-variant/15"
                                id="btn-criar-conta">
                                Criar Nova Conta
                            </button>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer class="w-full absolute bottom-8 flex flex-col items-center justify-center gap-2 z-10">
        <p class="text-xs font-['Manrope'] tracking-wide text-zinc-600">
            © 2026 ROLES
        </p>
        <div class="flex gap-4">
            <a class="text-xs font-['Manrope'] tracking-wide text-zinc-600 hover:text-purple-400 transition-opacity"
                href="#">Termos</a>
            <a class="text-xs font-['Manrope'] tracking-wide text-zinc-600 hover:text-purple-400 transition-opacity"
                href="#">Privacidade</a>
        </div>
    </footer>
    <script type="module" src="../../js/auth.js"></script>
</body>
</html>
